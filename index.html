<title>Moowan Link Bio</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Kanit',sans-serif;
background:linear-gradient(180deg,#ffc1dd,#ffe6f2,#ffffff);
text-align:center;
color:#444;
}

/* กล่องหลัก */
.container{
max-width:420px;
margin:auto;
padding:35px 20px;
}

/* โปรไฟล์ */
.profile img{
width:115px;
height:115px;
border-radius:50%;
object-fit:cover;
border:5px solid #fff;
box-shadow:0 8px 20px rgba(255,105,180,.25);
}

h1{
margin:14px 0 6px;
font-family:'Mali',cursive;
color:#ff4fa3;
}

.bio{
font-size:14px;
margin-bottom:28px;
opacity:.85;
}

/* หัวข้อ */
.section{
margin-top:28px;
margin-bottom:10px;
font-weight:600;
font-size:14px;
color:#ff4fa3;
}

/* ปุ่ม */
.link{
display:block;
background:white;
padding:16px;
margin:12px 0;
border-radius:18px;
text-decoration:none;
color:#444;
font-weight:500;
box-shadow:0 6px 16px rgba(255,105,180,.18);
transition:.25s;
}

.link:hover{
transform:translateY(-3px);
background:#fff0f7;
box-shadow:0 10px 20px rgba(255,105,180,.28);
}

/* footer */
.footer{
margin-top:35px;
font-size:12px;
opacity:.6;
}

</style>
</head>

<body>

<div class="profile">

</div>
</div>
