<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Candy LinkBio</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:'Kanit',sans-serif;

background-image:url("IMG_2047.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

text-align:center;
color:#444;
}


/* ===== GLASS CARD ===== */
.container{
max-width:420px;
margin:30px auto;
padding:35px 20px;

background:rgba(255,255,255,0.75);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border-radius:25px;
box-shadow:0 15px 40px rgba(255,105,180,.18);

position:relative;
overflow:hidden;

animation:fadeUp 1s ease;
}


/* light glow effect */
.container::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transform:rotate(25deg);
pointer-events:none;
}


/* ===== PROFILE ===== */
.profile img{
width:115px;
height:115px;
border-radius:50%;
object-fit:cover;
border:5px solid #fff;
box-shadow:0 8px 20px rgba(255,105,180,.25);
}

h1{
margin:14px 0 6px;
font-family:'Mali',cursive;
color:#ff4fa3;
}

.bio{
font-size:14px;
margin-bottom:28px;
opacity:.85;
}


/* ===== SECTION ===== */
.section{
margin-top:28px;
margin-bottom:10px;
font-weight:600;
font-size:14px;
color:#ff4fa3;
}


/* ===== LINK BUTTON ===== */
.link{
display:block;
padding:16px;
margin:12px 0;
border-radius:18px;

background:linear-gradient(135deg,#ffd6ec,#fff0f7);
text-decoration:none;
color:#ff4fa3;
font-weight:500;

box-shadow:0 6px 16px rgba(255,105,180,.18);
transition:all .3s ease;
}

.link:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 12px 28px rgba(255,105,180,.28);
}


/* ===== FOOTER ===== */
.footer{
margin-top:35px;
font-size:12px;
opacity:.6;
}


/* ===== OPEN ANIMATION ===== */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="container">

<div class="profile">
<img src="663BD7F6-F626-4873-BCE0-819856CFC4B8.jpeg">
<h1>🐰 Candy Shop</h1>

</div>
