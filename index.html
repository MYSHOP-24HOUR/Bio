<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Candy LinkBio</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:'Kanit',sans-serif;

background:linear-gradient(
180deg,
#ffc1dd 0%,
#ffe6f2 45%,
#ffffff 100%
);

text-align:center;
color:#444;
overflow-x:hidden;

animation:pageFade 1.2s ease;
}


/* ===== CONTAINER ===== */
.container{
max-width:420px;
margin:0 auto;
padding:40px 22px;
}


/* ===== PROFILE ===== */
.profile img{
width:115px;
height:115px;
border-radius:50%;
object-fit:cover;
border:5px solid #fff;
box-shadow:0 10px 25px rgba(255,105,180,.25);

animation:popIn .9s ease;
}

h1{
margin:14px 0 6px;
font-family:'Mali',cursive;
color:#ff4fa3;
}

.bio{
font-size:14px;
margin-bottom:28px;
opacity:.85;
}


/* ===== SECTION ===== */
.section{
margin-top:30px;
margin-bottom:12px;
font-weight:600;
font-size:14px;
color:#ff4fa3;
letter-spacing:.5px;
}


/* ===== LINK BUTTON ===== */
.link{
display:block;
padding:16px;
margin:14px 0;
border-radius:999px;

background:white;
text-decoration:none;
color:#ff4fa3;
font-weight:500;

box-shadow:0 8px 22px rgba(255,105,180,.18);

transition:all .3s ease;
}

.link:hover{
transform:translateY(-5px) scale(1.04);
box-shadow:0 15px 35px rgba(255,105,180,.28);
background:#fff0f7;
}


/* ===== FOOTER ===== */
.footer{
margin-top:40px;
font-size:12px;
opacity:.6;
}


/* ===== ANIMATIONS ===== */
@keyframes pageFade{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes popIn{
from{
opacity:0;
transform:scale(.85);
}
to{
opacity:1;
transform:scale(1);
}
}

</style>
</head>

<body>

<div class="container">

<div class="profile">
<img src="663BD7F6-F626-4873-BCE0-819856CFC4B8.jpeg">

</div>
