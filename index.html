<!DOCTYPE html>

<style>

/* ===== BODY (GLOW BACKGROUND) ===== */
body{
margin:0;
font-family:'Kanit',sans-serif;

background:
radial-gradient(circle at 20% 20%, rgba(255,182,210,.35), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(255,210,230,.35), transparent 45%),
linear-gradient(180deg,#ffc1dd,#ffe6f2,#ffffff);

text-align:center;
color:#444;
min-height:100vh;

animation:pageFade 1.1s ease;
}

/* soft blur layer */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(255,255,255,.25);
backdrop-filter:blur(60px);
z-index:-1;
}


/* ===== CONTAINER (LEFT STYLE GLASS) ===== */
.container{
max-width:420px;
margin-left:6%;
margin-top:50px;
margin-bottom:50px;
padding:38px 24px;

background:rgba(255,255,255,0.82);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border-radius:28px;
border:1px solid rgba(255,192,203,.35);

box-shadow:
0 10px 30px rgba(255,105,180,.15),
0 0 25px rgba(255,182,193,.15);

animation:cardFade .9s ease;
}


/* ===== PROFILE ===== */
.profile img{
width:115px;
height:115px;
border-radius:50%;
object-fit:cover;
border:5px solid #fff;
box-shadow:0 10px 25px rgba(255,105,180,.25);

animation:popIn .9s ease;
}

h1{
margin:14px 0 6px;
font-family:'Mali',cursive;
color:#ff4fa3;
}

.bio{
font-size:14px;
margin-bottom:28px;
opacity:.85;
}


/* ===== SECTION ===== */
.section{
margin-top:28px;
margin-bottom:10px;
font-weight:600;
font-size:14px;
color:#ff4fa3;
letter-spacing:.5px;
}


/* ===== LINK BUTTON ===== */
.link{
display:block;
background:rgba(255,255,255,0.9);
padding:16px;
margin:14px 0;
border-radius:18px;
text-decoration:none;
color:#444;
font-weight:500;

border:1px solid rgba(255,182,210,.35);
backdrop-filter:blur(6px);

box-shadow:0 6px 16px rgba(255,105,180,.18);

transition:all .3s ease;

/* floating animation */
animation:float 3.5s ease-in-out infinite;
}

.link:hover{
transform:translateY(-5px) scale(1.03);
background:#fff0f7;
box-shadow:0 14px 30px rgba(255,105,180,.28);
}


/* ===== MAIN BUTTON (ขายจริง) ===== */
.main-link{
background:linear-gradient(135deg,#ff8fc7,#ff4fa3);
color:white;
font-weight:600;
box-shadow:0 12px 28px rgba(255,105,180,.35);
}


/* ===== FOOTER ===== */
.footer{
margin-top:35px;
font-size:12px;
opacity:.6;
}


/* ===== ANIMATIONS ===== */
@keyframes pageFade{
from{opacity:0;}
to{opacity:1;}
}

@keyframes cardFade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes popIn{
from{
opacity:0;
transform:scale(.85);
}
to{
opacity:1;
transform:scale(1);
}
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-3px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

<div class="profile">
<img src="663BD7F6-F626-4873-BCE0-819856CFC4B8.jpeg">
