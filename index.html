<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:'Kanit',sans-serif;

/* พื้นหลัง */
background-image:url("IMG_2047.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

text-align:center;
color:#444;
}


/* ===== CONTAINER (GLASS CARD) ===== */
.container{
max-width:420px;
margin:auto;
padding:35px 20px;

background:rgba(255,255,255,0.75);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

border-radius:25px;
box-shadow:0 15px 40px rgba(255,105,180,.18);

margin-top:30px;
margin-bottom:30px;

position:relative;
overflow:hidden;

/* LEVEL 5 animation */
animation:fadeUp 1s ease;
}


/* ===== GLASS LIGHT EFFECT (LEVEL 4) ===== */
.container::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.35),
transparent
);

transform:rotate(25deg);
pointer-events:none;
}


/* ===== PROFILE IMAGE ===== */
.profile-img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;

box-shadow:0 8px 20px rgba(255,105,180,.25);
}


/* ===== TITLE ===== */
h1{
margin:10px 0 5px;
color:#ff4fa3;
font-weight:600;
}

p{
margin-bottom:20px;
font-size:14px;
opacity:.8;
}


/* ===== LINK BUTTON (LEVEL 3 INTERACTIVE) ===== */
.link{
display:block;
padding:14px;
margin:12px 0;
border-radius:15px;

background:linear-gradient(135deg,#ffd6ec,#ffeaf5);
text-decoration:none;
color:#ff4fa3;
font-weight:500;

box-shadow:0 5px 15px rgba(255,105,180,.15);
transition:all .3s ease;
}


/* Hover / Tap Effect */
.link:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 12px 28px rgba(255,105,180,.28);
}


/* ===== OPEN ANIMATION ===== */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
/* ===== โปรไฟล์ ===== */
.profile img{
width:115px;
height:115px;
border-radius:50%;
object-fit:cover;
border:5px solid #fff;
box-shadow:0 8px 20px rgba(255,105,180,.25);
}

h1{
margin:14px 0 6px;
font-family:'Mali',cursive;
color:#ff4fa3;
}

.bio{
font-size:14px;
margin-bottom:28px;
opacity:.85;
}

/* ===== หัวข้อ ===== */
.section{
margin-top:28px;
margin-bottom:10px;
font-weight:600;
font-size:14px;
color:#ff4fa3;
}

/* ===== ปุ่ม ===== */
.link{
display:block;
background:rgba(255,255,255,0.9);
padding:16px;
margin:12px 0;
border-radius:18px;
text-decoration:none;
color:#444;
font-weight:500;

border:1px solid rgba(255,182,210,.35);
backdrop-filter:blur(6px);

box-shadow:0 6px 16px rgba(255,105,180,.18);
transition:.25s;
}

.link:hover{
transform:translateY(-4px);
background:#fff0f7;
box-shadow:0 12px 24px rgba(255,105,180,.28);
}

/* ===== footer ===== */
.footer{
margin-top:35px;
font-size:12px;
opacity:.6;
}

</style>
</head>

<body>

<div class="profile">
<img src="663BD7F6-F626-4873-BCE0-819856CFC4B8.jpeg">
